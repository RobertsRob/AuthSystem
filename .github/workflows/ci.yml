name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test code
      env:
        FLASK_SECRET_KEY: "ci-test-secret-key-not-for-production"
      run: pytest

  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: CI/CD env
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
      
      - name: Verify cloudflared
        run: cloudflared --version
      
      - name: Fix DNS resolution for cloudflared
        run: |
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Check key file is valid
        run: |
          echo "--- First/last lines ---"
          head -n 1 ~/.ssh/id_ed25519
          tail -n 1 ~/.ssh/id_ed25519
          echo "--- Deriving public key from private key ---"
          ssh-keygen -y -f ~/.ssh/id_ed25519 -P "" || echo "KEY IS INVALID"

      - name: Test cloudflared can reach the tunnel
        run: |
          timeout 10 cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }} --url http://localhost:9999 &
          sleep 3
          echo "If no error above, tunnel connection itself works"

      - name: Inspect key file bytes
        run: |
          echo "--- Byte count ---"
          wc -c ~/.ssh/id_ed25519
          echo "--- Line count ---"
          wc -l ~/.ssh/id_ed25519
          echo "--- First 5 bytes as hex ---"
          head -c 5 ~/.ssh/id_ed25519 | xxd
          echo "--- Does it contain literal backslash-n instead of real newlines? ---"
          grep -c '\\n' ~/.ssh/id_ed25519 || echo "no literal \\n found (good)"

      - name: Test SSH connection only (no deploy command)
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}" \
              -i ~/.ssh/id_ed25519 \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "echo SSH LOGIN SUCCEEDED && whoami && pwd"

      - name: Test git pull only
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}" \
              -i ~/.ssh/id_ed25519 \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd ${{ secrets.DEPLOY_PATH }} && git pull origin main"

      - name: Deploy (docker rebuild)
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}" \
              -i ~/.ssh/id_ed25519 \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd ${{ secrets.DEPLOY_PATH }} && docker compose up -d --build"
      # - name: Deploy via SSH through Cloudflare Tunnel
      #   run: |
      #     ssh -o StrictHostKeyChecking=no \
      #         -o ProxyCommand="cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}" \
      #         -i ~/.ssh/id_ed25519 \
      #         ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
      #         "cd ${{ secrets.DEPLOY_PATH }} && git pull origin main && docker compose up -d --build"

