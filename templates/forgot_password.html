<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='main_style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/plant.png') }}" type="image/x-icon">
    <title>Forgot password</title>
    <script>
        function onCapchaSuccess(){document.getElementById("submit_button").disabled = false;}
    </script>
</head>
<body>
    <div class="full_screen">
        <div class="form_middle">
            <a class="arrow_back_auth" href="/login">← back</a>

            <p class="main_text center_text">Forgot password</p>
            {% if error %}
                <p class="text_upper">{{ error }}</p>
            {% endif %}
            
            <form action="/send_password_reset_email" method="POST">
                <label for="email" class="label_form"> Enter email: </label>
                <input type="email" id="email" name="email" class="input_form_field" placeholder="Enter Email" required autocomplete="email">

                <div class="h-captcha capcha_placement" data-sitekey="0ff041fe-1418-4c74-8bca-10882266eb3a" data-callback="onCapchaSuccess"></div>
                <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

                <input type="submit" id="submit_button" class="submit_button" value="Get reset email" disabled>
            </form>
        </div>
    </div>
</body>
</html>
